<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Styling Lookup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f8f6;
    min-height: 100vh;
    padding: 40px 20px;
    color: #1a1a1a;
  }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; color: #111; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap input {
    width: 100%;
    padding: 14px 48px 14px 16px;
    font-size: 15px;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    outline: none;
    background: #fff;
    transition: border-color 0.2s;
    color: #111;
  }
  .search-wrap input:focus { border-color: #111; }
  .clear-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #aaa; font-size: 20px;
    display: none; line-height: 1;
  }
  .clear-btn.visible { display: block; }
  .match-toggle { display: flex; gap: 8px; margin-bottom: 24px; }
  .match-toggle button {
    padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ddd;
    background: #fff; font-size: 12px; cursor: pointer; color: #555; transition: all 0.15s;
  }
  .match-toggle button.active { background: #111; border-color: #111; color: #fff; }
  .status { font-size: 13px; color: #888; margin-bottom: 16px; min-height: 18px; }
  .results { display: flex; flex-direction: column; gap: 14px; }
  .result-card {
    background: #fff; border: 1.5px solid #e8e8e8; border-radius: 12px;
    padding: 18px 20px; transition: box-shadow 0.15s;
  }
  .result-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .card-product { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .card-tab { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #888; margin-bottom: 8px; }
  .styled-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .styled-chip { background: #f3f3f1; border-radius: 6px; padding: 5px 10px; font-size: 13px; color: #333; }
  .empty { text-align: center; padding: 48px 20px; color: #aaa; font-size: 14px; }
  .empty .icon { font-size: 32px; margin-bottom: 10px; }
  .loading { text-align: center; padding: 48px; color: #aaa; font-size: 14px; }
  .spinner {
    width: 24px; height: 24px; border: 2px solid #eee; border-top-color: #111;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    background: #fff5f5; border: 1.5px solid #ffd5d5; border-radius: 10px;
    padding: 14px 16px; color: #c0392b; font-size: 13px; line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Product Styling Lookup</h1>
  <p class="subtitle">Search a product to see what it has been styled with</p>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Paste or type a product name..." autocomplete="off" />
    <button class="clear-btn" id="clearBtn">x</button>
  </div>

  <div class="match-toggle">
    <button id="btnBoth" class="active" onclick="setMode('both')">Both</button>
    <button id="btnExact" onclick="setMode('exact')">Exact match</button>
    <button id="btnPartial" onclick="setMode('partial')">Partial match</button>
  </div>

  <div class="status" id="status"></div>
  <div id="results"></div>
</div>

<script>
const NETLIFY_URL = '/.netlify/functions/sheet';

let allData = [];
let matchMode = 'both';
let searchTimer;

async function loadSheet() {
  const resultsEl = document.getElementById('results');
  const statusEl = document.getElementById('status');
  resultsEl.innerHTML = '<div class="loading"><div class="spinner"></div>Loading sheet data...</div>';
  statusEl.textContent = '';

  try {
    const res = await fetch(NETLIFY_URL);
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    allData = [];
    const tabs = Object.keys(json);

    tabs.forEach(function(tab) {
      const rows = json[tab];
      if (!rows || rows.length < 2) return;

      const headers = rows[0].map(function(h) { return String(h).trim().toLowerCase(); });
      const productCol = headers.findIndex(function(h) {
        return h.includes('product') || h.includes('name') || h.includes('item');
      });
      if (productCol === -1) return;

      const styledCols = headers.map(function(_, i) { return i; }).filter(function(i) { return i !== productCol; });

      rows.slice(1).forEach(function(row) {
        const product = String(row[productCol] || '').trim();
        if (!product) return;
        const styledWith = styledCols
          .map(function(i) { return String(row[i] || '').trim(); })
          .filter(function(v) { return v && v !== '-' && v.toLowerCase() !== 'n/a'; });
        allData.push({ tab: tab, product: product, styledWith: styledWith });
      });
    });

    resultsEl.innerHTML = '';
    statusEl.textContent = allData.length + ' products loaded across ' + tabs.length + ' tab' + (tabs.length !== 1 ? 's' : '') + '.';
  } catch (e) {
    resultsEl.innerHTML = '<div class="error">Could not load sheet data. Error: ' + e.message + '</div>';
    statusEl.textContent = '';
  }
}

function setMode(m) {
  matchMode = m;
  document.getElementById('btnBoth').classList.toggle('active', m === 'both');
  document.getElementById('btnExact').classList.toggle('active', m === 'exact');
  document.getElementById('btnPartial').classList.toggle('active', m === 'partial');
  doSearch();
}

function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');

  if (!query) {
    resultsEl.innerHTML = '';
    statusEl.textContent = allData.length ? allData.length + ' products loaded.' : '';
    return;
  }

  const q = query.toLowerCase();
  let matches = [];

  if (matchMode === 'exact' || matchMode === 'both')
    matches = matches.concat(allData.filter(function(d) { return d.product.toLowerCase() === q; }));
  if (matchMode === 'partial' || matchMode === 'both')
    matches = matches.concat(allData.filter(function(d) {
      const pl = d.product.toLowerCase();
      return pl !== q && pl.includes(q);
    }));

  const seen = new Set();
  matches = matches.filter(function(d) {
    const k = d.tab + '|' + d.product;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  if (matches.length === 0) {
    statusEl.textContent = 'No results for "' + query + '"';
    resultsEl.innerHTML = '<div class="empty"><div class="icon">🔍</div>No products found matching "' + query + '"</div>';
    return;
  }

  statusEl.textContent = matches.length + ' result' + (matches.length !== 1 ? 's' : '') + ' for "' + query + '"';
  resultsEl.innerHTML = matches.map(function(m) {
    return '<div class="result-card">' +
      '<div class="card-product">' + m.product + '</div>' +
      '<div class="card-tab">' + m.tab + '</div>' +
      (m.styledWith.length > 0
        ? '<div class="card-label">Styled with</div><div class="styled-list">' +
          m.styledWith.map(function(s) { return '<span class="styled-chip">' + s + '</span>'; }).join('') +
          '</div>'
        : '<div style="font-size:13px;color:#aaa">No styling info available</div>') +
      '</div>';
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('clearBtn').classList.toggle('visible', this.value.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 250);
});

document.getElementById('clearBtn').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  this.classList.remove('visible');
  doSearch();
});

loadSheet();
</script>
</body>
</html>
