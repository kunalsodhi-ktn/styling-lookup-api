<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styled With Finder — Kotn</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #FAF9F7;
    min-height: 100vh;
    color: #1a1a1a;
  }

  header {
    border-bottom: 1px solid #E5E2DC;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #FAF9F7;
  }

  header .logo {
    font-family: 'EB Garamond', serif;
    font-size: 22px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #1a1a1a;
    text-decoration: none;
  }

  header .tag {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    font-weight: 400;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  .heading {
    font-family: 'EB Garamond', serif;
    font-size: 36px;
    font-weight: 400;
    color: #1a1a1a;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13px;
    color: #888;
    font-weight: 300;
    letter-spacing: 0.02em;
    margin-bottom: 40px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .search-wrap input {
    width: 100%;
    padding: 15px 48px 15px 0;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    border: none;
    border-bottom: 1.5px solid #C8C4BC;
    border-radius: 0;
    outline: none;
    background: transparent;
    color: #1a1a1a;
    transition: border-color 0.2s;
    letter-spacing: 0.01em;
  }

  .search-wrap input::placeholder { color: #B0ADA6; }
  .search-wrap input:focus { border-bottom-color: #1a1a1a; }

  .clear-btn {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #B0ADA6;
    font-size: 18px; display: none; line-height: 1; padding: 4px;
  }
  .clear-btn.visible { display: block; }

  .match-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 40px;
  }

  .match-toggle button {
    padding: 5px 14px;
    border-radius: 0;
    border: 1px solid #C8C4BC;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: #888;
    transition: all 0.15s;
  }

  .match-toggle button.active {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: #FAF9F7;
  }

  .status {
    font-size: 12px;
    color: #B0ADA6;
    margin-bottom: 24px;
    min-height: 16px;
    letter-spacing: 0.03em;
  }

  .results { display: flex; flex-direction: column; gap: 1px; }

  .result-card {
    background: #fff;
    border: 1px solid #E5E2DC;
    padding: 24px 28px;
    transition: background 0.15s;
  }

  .result-card:hover { background: #FDFCFA; }

  .card-product {
    font-family: 'EB Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: #1a1a1a;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-tab {
    font-size: 10px;
    color: #B0ADA6;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 16px;
  }

  .card-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #888;
    margin-bottom: 10px;
  }

  .styled-list { display: flex; flex-direction: column; gap: 6px; }

  .styled-chip {
    font-size: 13px;
    color: #3a3a3a;
    font-weight: 300;
    line-height: 1.5;
    padding: 6px 0;
    border-bottom: 1px solid #F0EDE8;
  }

  .styled-chip:last-child { border-bottom: none; }

  .empty {
    text-align: center;
    padding: 64px 20px;
    color: #B0ADA6;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  .loading {
    text-align: center;
    padding: 64px;
    color: #B0ADA6;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 1.5px solid #E5E2DC;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: #fff5f5;
    border: 1px solid #ffd5d5;
    padding: 16px 20px;
    color: #c0392b;
    font-size: 13px;
    line-height: 1.6;
    font-weight: 300;
  }

  footer {
    border-top: 1px solid #E5E2DC;
    padding: 20px 40px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #C8C4BC;
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="https://kotn.com">Kotn Internal Use Only</a>
  <span class="tag">Internal Tool</span>
</header>

<div class="container">
  <h1 class="heading">Styled With Finder</h1>
  <p class="subtitle">Search a product to see what it has been styled with</p>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Enter a product name..." autocomplete="off" />
    <button class="clear-btn" id="clearBtn">×</button>
  </div>

  <div class="match-toggle">
    <button id="btnBoth" class="active" onclick="setMode('both')">Both</button>
    <button id="btnExact" onclick="setMode('exact')">Exact</button>
    <button id="btnPartial" onclick="setMode('partial')">Partial</button>
  </div>

  <div class="status" id="status"></div>
  <div id="results"></div>
</div>

<footer>© Kotn</footer>

<script>
const NETLIFY_URL = '/.netlify/functions/sheet';

let allData = [];
let matchMode = 'both';
let searchTimer;

async function loadSheet() {
  const resultsEl = document.getElementById('results');
  const statusEl = document.getElementById('status');
  resultsEl.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
  statusEl.textContent = '';

  try {
    const res = await fetch(NETLIFY_URL);
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    allData = [];
    const tabs = Object.keys(json);

    tabs.forEach(function(tab) {
      const rows = json[tab];
      if (!rows || rows.length < 2) return;

      const headers = rows[0].map(function(h) { return String(h).trim().toLowerCase(); });

      const productCol = headers.findIndex(function(h) { return h === 'final product name'; });
      if (productCol === -1) return;

      const styledWithCol = headers.findIndex(function(h) { return h === 'styled with'; });
      if (styledWithCol === -1) return;

      const styledCols = [styledWithCol];

      rows.slice(1).forEach(function(row) {
        const product = String(row[productCol] || '').trim();
        if (!product) return;
        const styledWith = styledCols
          .map(function(i) { return String(row[i] || '').trim(); })
          .filter(function(v) { return v && v !== '-' && v.toLowerCase() !== 'n/a'; });
        allData.push({ tab: tab, product: product, styledWith: styledWith });
      });
    });

    resultsEl.innerHTML = '';
    statusEl.textContent = allData.length + ' products loaded across ' + tabs.length + ' tab' + (tabs.length !== 1 ? 's' : '') + '.';
  } catch (e) {
    resultsEl.innerHTML = '<div class="error">Could not load sheet data. Error: ' + e.message + '</div>';
    statusEl.textContent = '';
  }
}

function setMode(m) {
  matchMode = m;
  document.getElementById('btnBoth').classList.toggle('active', m === 'both');
  document.getElementById('btnExact').classList.toggle('active', m === 'exact');
  document.getElementById('btnPartial').classList.toggle('active', m === 'partial');
  doSearch();
}

function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');

  if (!query) {
    resultsEl.innerHTML = '';
    statusEl.textContent = allData.length ? allData.length + ' products loaded.' : '';
    return;
  }

  const q = query.toLowerCase();
  let matches = [];

  if (matchMode === 'exact' || matchMode === 'both')
    matches = matches.concat(allData.filter(function(d) { return d.product.toLowerCase() === q; }));
  if (matchMode === 'partial' || matchMode === 'both')
    matches = matches.concat(allData.filter(function(d) {
      const pl = d.product.toLowerCase();
      return pl !== q && pl.includes(q);
    }));

  const seen = new Set();
  matches = matches.filter(function(d) {
    const k = d.tab + '|' + d.product;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  if (matches.length === 0) {
    statusEl.textContent = 'No results for "' + query + '"';
    resultsEl.innerHTML = '<div class="empty">No products found matching "' + query + '"</div>';
    return;
  }

  statusEl.textContent = matches.length + ' result' + (matches.length !== 1 ? 's' : '') + ' for "' + query + '"';
  resultsEl.innerHTML = matches.map(function(m) {
    return '<div class="result-card">' +
      '<div class="card-product">' + m.product + '</div>' +
      '<div class="card-tab">' + m.tab + '</div>' +
      (m.styledWith.length > 0
        ? '<div class="card-label">Styled with</div><div class="styled-list">' +
          m.styledWith.map(function(s) { return '<span class="styled-chip">' + s + '</span>'; }).join('') +
          '</div>'
        : '<div style="font-size:13px;color:#B0ADA6;font-weight:300">No styling info available</div>') +
      '</div>';
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('clearBtn').classList.toggle('visible', this.value.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 250);
});

document.getElementById('clearBtn').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  this.classList.remove('visible');
  doSearch();
});

loadSheet();
</script>
</body>
</html>
